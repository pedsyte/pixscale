server {
    server_name pixscale.gornich.fun;

    root /opt/pixscale/frontend;
    index index.html;

    client_max_body_size 50M;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pixscale.gornich.fun/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pixscale.gornich.fun/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = pixscale.gornich.fun) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name pixscale.gornich.fun;
    return 404; # managed by Certbot


}